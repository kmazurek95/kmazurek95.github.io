{{ define "main" }}
<div class="container content-narrow">
  <header class="page-header">
    <h1>Experience</h1>
    <p>Research, applied AI evaluation, and political data work.</p>
  </header>
  <div class="timeline">
    {{ range .Pages.ByWeight }}
    <div class="timeline-item">
      <div class="timeline-item__date">{{ .Params.dates }}</div>
      <h3 class="timeline-item__title">{{ .Title }}</h3>
      <div class="timeline-item__org">{{ .Params.organization }}</div>
      <div class="timeline-item__desc">{{ .Content }}</div>
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
