{{ define "main" }}
<div class="container content-narrow">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p>{{ . }}</p>{{ end }}
  </header>
  <ul class="post-list">
    {{ range .Pages }}
    <li class="post-item">
      <time class="post-date">{{ .Date.Format "Jan 2006" }}</time>
      <div>
        <div class="post-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></div>
        {{ with .Params.summary }}<p class="post-excerpt">{{ . }}</p>{{ end }}
      </div>
    </li>
    {{ end }}
  </ul>
</div>
{{ end }}
