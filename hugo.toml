baseURL = "https://kmazurek95.github.io/"
languageCode = "en-us"
title = "Kaleb Mazurek"
paginate = 10
enableRobotsTXT = true
enableEmoji = true
enableGitInfo = true

[params]
  description = "Quantitative social scientist studying the distributional politics of AI — how artificial intelligence creates winners and losers through labor markets, energy systems, and geopolitical dependencies, and how institutional configurations shape whether societies respond with solidarity or exclusion."
  author = "Kaleb Mazurek"
  tagline = "Distributional Politics of AI · Comparative Political Economy · Multilevel Modeling"
  github = "https://github.com/kmazurek95"
  linkedin = "https://www.linkedin.com/in/kaleb-mazurek/"
  email = ""

[frontmatter]
  lastmod = [":git", "lastmod", "date"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokailight"

[taxonomies]
  tag = "tags"
  category = "categories"
  method = "methods"

[menu]
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 1
  [[menu.main]]
    name = "Research"
    url = "/research-program/"
    weight = 2
  [[menu.main]]
    name = "Projects"
    url = "/projects/"
    weight = 3
  [[menu.main]]
    name = "Writing"
    url = "/posts/"
    weight = 4
  [[menu.main]]
    name = "CV"
    url = "/cv/"
    weight = 5

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
