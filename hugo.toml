baseURL = "https://kmazurek95.github.io/"
languageCode = "en-us"
title = "Kaleb Mazurek"
paginate = 10
enableRobotsTXT = true
enableEmoji = false
enableGitInfo = true

[params]
  description = "Quantitative social scientist working on the political economy of AI. Writing on the political and economic consequences of AI infrastructure: labor markets, energy systems, and welfare state institutions."
  author = "Kaleb Mazurek"
  tagline = "Political Economy of AI · Comparative Political Economy · Multilevel Modeling"
  github = "https://github.com/kmazurek95"
  linkedin = "https://www.linkedin.com/in/kaleb-mazurek/"
  email = ""

[frontmatter]
  lastmod = [":git", "lastmod", "date"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokailight"

[taxonomies]
  tag = "tags"
  category = "categories"
  method = "methods"

[menu]
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 1
  [[menu.main]]
    name = "Research"
    url = "/research-program/"
    weight = 2
  [[menu.main]]
    name = "Projects"
    url = "/projects/"
    weight = 3
  [[menu.main]]
    name = "Writing"
    url = "/writing/"
    weight = 4
  [[menu.main]]
    name = "CV"
    url = "/cv/"
    weight = 5

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
